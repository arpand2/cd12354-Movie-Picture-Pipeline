name: Backend CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'starter/backend/**'
  workflow_dispatch:

jobs:
    lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install pipenv
        run: pip install pipenv
      - name: Install dependencies and Lint
        run: |
          cd starter/backend
          pipenv install --dev
          pipenv run lint
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install pipenv
        run: pip install pipenv
      - name: Install deps & Test
        run: |
          cd starter/backend
          pipenv install
          pipenv run test

  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker
        run: |
          cd starter/backend
          docker build -t mp-backend:${{ github.sha }} .